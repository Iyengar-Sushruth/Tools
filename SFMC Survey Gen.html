<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFMC Survey Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
/* Basic Resets & Variables */
:root {
/* --- Black & Dark Orange Premium Theme --- */
--bg-primary: #0a0a0a; /* Deep black */
--bg-secondary: #141414; /* Charcoal black */
--bg-tertiary: #1f1f1f; /* Lighter charcoal */
--bg-card: #1a1a1a; /* Card background */
--text-primary: #ffffff; /* Pure white for primary text */
--text-secondary: #b8b8b8; /* Light grey for secondary text */
--text-tertiary: #888888; /* Medium grey for tertiary text */
--border-color: #2a2a2a; /* Dark grey borders */
--accent-color: #ff8c00; /* Dark orange accent */
--accent-light: #ffa500; /* Lighter orange */
--accent-dark: #cc6600; /* Darker orange */
--button-bg: #ff8c00; /* Button background */
--button-text: #ffffff; /* White text on orange buttons */
--input-bg: #1a1a1a; /* Input field background */
--input-border: #2a2a2a; /* Input field border */
--input-text: #ffffff; /* White input text */
--shadow-color: rgba(0, 0, 0, 0.8);
--shadow-glow: 0 0 20px rgba(255, 140, 0, 0.3);
--toast-info-bg: #3b82f6;
--toast-error-bg: #ef4444;
--toast-text-color: #ffffff;
--accent-color-rgb: 255, 140, 0; /* Dark orange RGB */

/* Success/Warning/Error colors */
--success-color: #10b981;
--warning-color: #fbbf24;
--error-color: #ef4444;
--info-color: #3b82f6;
}

* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
color: var(--text-primary);
background: #000000;
background-image: 
    radial-gradient(ellipse at top left, rgba(255, 140, 0, 0.03), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(255, 140, 0, 0.02), transparent 50%);
background-attachment: fixed;
transition: all 0.3s ease;
overflow: hidden;
}

#app {
display: flex;
flex-direction: column;
height: 100vh;
}

/* Header */
.app-header {
background: linear-gradient(135deg, #141414 0%, #0a0a0a 100%);
padding: 15px 25px;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 2px solid #ff8c00;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
z-index: 100;
}

.app-header h1 {
color: #ff8c00;
font-size: 1.8em;
font-weight: 700;
letter-spacing: -0.5px;
}

.header-controls {
display: flex;
gap: 15px;
}

/* Conditional Logic Indicator */
.conditional-indicator {
display: inline-flex;
align-items: center;
gap: 5px;
font-size: 0.85em;
color: #ff8c00;
margin-left: 10px;
padding: 4px 10px;
background: rgba(255, 140, 0, 0.12);
border-radius: 6px;
border: 1px solid rgba(255, 140, 0, 0.3);
}

.conditional-logic-section {
background: rgba(255, 140, 0, 0.06);
border: 1px dashed rgba(255, 140, 0, 0.3);
padding: 12px;
border-radius: 6px;
margin-top: 10px;
}

.conditional-logic-info {
font-size: 0.85em;
color: var(--text-secondary);
margin-top: 10px;
padding: 8px 12px;
background: #1a1a1a;
border-radius: 4px;
border-left: 3px solid #ff8c00;
display: flex;
align-items: flex-start;
gap: 8px;
}

.conditional-logic-info i {
margin-top: 2px;
color: #ff8c00;
}

/* Main Layout */
.main-layout {
display: flex;
flex: 1;
overflow: hidden;
}

/* Sidebar */
.sidebar {
background: #141414;
padding: 20px;
border-right: 1px solid var(--border-color);
width: 250px;
flex-shrink: 0;
overflow-y: auto;
max-height: calc(100vh - 70px);
}

.sidebar.right-sidebar {
width: 400px;
border-right: none;
border-left: 1px solid var(--border-color);
}

.sidebar.right-sidebar::after {
content: '';
position: sticky;
bottom: 0;
left: 0;
right: 0;
height: 30px;
background: linear-gradient(to top, #141414, transparent);
pointer-events: none;
opacity: 0;
transition: opacity 0.3s;
}

.sidebar.right-sidebar.has-overflow::after {
opacity: 1;
}

.sidebar h2 {
color: aliceblue;
margin-bottom: 20px;
font-size: 1.3em;
font-weight: 700;
border-bottom: 2px solid aliceblue;
padding-bottom: 10px;
}

.modal-overlay {
 display: none;
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 background: rgba(10, 10, 10, 0.92);
 backdrop-filter: blur(8px);
 z-index: 2000;
 align-items: center;
 justify-content: center;
 animation: fadeIn 0.3s ease-out;
}

.modal-overlay.show {
 display: flex !important;
}

/* Modal Content Container */
.modal-content {
 background: #252526;
 border: 1px solid #3e3e42;
 border-radius: 12px;
 padding: 30px;
 max-width: 900px;
 width: 90%;
 max-height: 85vh; /* ✅ FIXED: Was 100vh */
 overflow: hidden; /* ✅ FIXED: Remove outer scrollbar */
 box-shadow: 0 25px 70px rgba(0, 0, 0, 0.9),
             0 0 0 1px rgba(79, 195, 247, 0.3);
 animation: modalSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
 position: relative;
 display: flex;
 flex-direction: column;
}

/* Modal Header - Fixed */
.modal-content h3 {
 color: #ffffff;
 font-size: 1.6em;
 margin: 0 0 20px 0;
 font-weight: 700;
 border-bottom: 2px solid #3e3e42;
 padding-bottom: 15px;
 display: flex;
 align-items: center;
 gap: 12px;
 flex-shrink: 0; /* ✅ Prevent header from shrinking */
}

/* Validation Summary - Fixed */
.validation-summary {
 display: flex;
 justify-content: space-around;
 padding: 15px;
 background: #1a1a1a;
 border-radius: 6px;
 margin-bottom: 15px;
 border: 1px solid #2a2a2a;
 flex-shrink: 0; /* ✅ Prevent summary from shrinking */
}

/* Validation Results Container - SINGLE SCROLLBAR */
#validation-results {
 flex: 1 1 auto; /* ✅ Allow to grow and shrink */
 overflow-y: auto; /* ✅ Only scrollbar here */
 overflow-x: hidden;
 padding: 15px;
 background: #1e1e1e;
 border-radius: 8px;
 border: 1px solid #3e3e42;
 margin-bottom: 15px;
}

/* ✅ FIXED: White scrollbar for validation results */
#validation-results::-webkit-scrollbar {
 width: 10px;
}

#validation-results::-webkit-scrollbar-track {
 background: #1e1e1e;
 border-radius: 5px;
}

#validation-results::-webkit-scrollbar-thumb {
 background: linear-gradient(180deg, #ffffff, #cccccc); /* ✅ WHITE */
 border-radius: 5px;
 border: 2px solid #1e1e1e;
}

#validation-results::-webkit-scrollbar-thumb:hover {
 background: linear-gradient(180deg, #ffffff, #e0e0e0); /* ✅ WHITE HOVER */
}

/* Modal Actions - Fixed */
.modal-actions {
 display: flex;
 gap: 12px;
 justify-content: flex-end;
 flex-wrap: wrap;
 margin-top: 15px;
 flex-shrink: 0; /* ✅ Prevent buttons from shrinking */
}

/* HTML Output Modal Textarea - Keep White Scrollbar */
.modal-content textarea {
 width: 100%;
 min-height: 450px;
 max-height: 60vh; /* ✅ Limit height */
 background: #1e1e1e;
 color: #cccccc;
 border: 1px solid #3e3e42;
 border-radius: 8px;
 padding: 15px;
 font-family: 'Courier New', 'Consolas', monospace;
 font-size: 13px;
 line-height: 1.6;
 resize: vertical;
 margin-bottom: 20px;
 box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
 overflow-y: auto;
}

.modal-content textarea:focus {
 outline: none;
 border-color: #ffffff;
 box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2),
             inset 0 2px 4px rgba(0, 0, 0, 0.3);
}

.modal-content textarea::-webkit-scrollbar {
 width: 10px;
}

.modal-content textarea::-webkit-scrollbar-track {
 background: #1e1e1e;
 border-radius: 5px;
}

/* ✅ White scrollbar for textarea */
.modal-content textarea::-webkit-scrollbar-thumb {
 background: linear-gradient(180deg, #ffffff, #cccccc);
 border-radius: 5px;
 border: 2px solid #1e1e1e;
}

.modal-content textarea::-webkit-scrollbar-thumb:hover {
 background: linear-gradient(180deg, #ffffff, #e0e0e0);
}

/* Validation Items */
.validation-item {
 padding: 12px 15px;
 margin-bottom: 10px;
 border-radius: 6px;
 display: flex;
 align-items: flex-start;
 gap: 12px;
 line-height: 1.5;
 animation: fadeIn 0.3s ease-out;
}

.validation-item.success {
 background: rgba(16, 185, 129, 0.12);
 border-left: 4px solid #10b981;
 border-radius: 0 6px 6px 0;
 color: #10b981;
}

.validation-item.warning {
 background: rgba(251, 191, 36, 0.12);
 border-left: 4px solid #fbbf24;
 border-radius: 0 6px 6px 0;
 color: #fbbf24;
}

.validation-item.error {
 background: rgba(239, 68, 68, 0.12);
 border-left: 4px solid #ef4444;
 border-radius: 0 6px 6px 0;
 color: #ef4444;
}

.validation-item i {
 font-size: 1.3em;
 margin-top: 2px;
 flex-shrink: 0;
}

.validation-item-content {
 flex: 1;
 color: var(--text-primary);
}

.validation-item-content strong {
 display: block;
 margin-bottom: 3px;
}

/* Validation Summary Items */
.validation-summary-item {
 text-align: center;
}

.validation-summary-item .count {
 font-size: 2.2em;
 font-weight: 800;
 display: block;
 margin-bottom: 5px;
}

.validation-summary-item .label {
 font-size: 0.85em;
 color: var(--text-secondary);
 text-transform: uppercase;
 letter-spacing: 1px;
}

.validation-summary-item.success .count { color: #10b981; }
.validation-summary-item.warning .count { color: #fbbf24; }
.validation-summary-item.error .count { color: #ef4444; }

/* Responsive Modal Adjustments */
@media (max-width: 768px) {
 .modal-content {
     width: 95%;
     padding: 20px;
     max-height: 90vh;
 }
 
 .modal-content h3 {
     font-size: 1.3em;
     margin-bottom: 15px;
 }
 
 #validation-results {
     padding: 12px;
 }
 
 .modal-content textarea {
     min-height: 350px;
     font-size: 12px;
     padding: 12px;
 }
 
 .modal-actions {
     flex-direction: column;
 }
 
 .modal-actions button {
     width: 100%;
 }
}

@media (max-width: 480px) {
 .modal-content {
     width: 98%;
     padding: 15px;
 }
 
 .modal-content h3 {
     font-size: 1.1em;
     flex-direction: column;
     align-items: flex-start;
     gap: 8px;
 }
 
 #validation-results {
     padding: 10px;
 }
 
 .modal-content textarea {
     min-height: 300px;
     font-size: 11px;
 }
}

.modal-content textarea:focus {
 outline: none;
 border-color: #ffffff;
 box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2),
             inset 0 2px 4px rgba(0, 0, 0, 0.3);
}

.modal-content textarea::-webkit-scrollbar {
 width: 10px;
}

.modal-content textarea::-webkit-scrollbar-track {
 background: #1e1e1e;
 border-radius: 5px;
}

.modal-content textarea::-webkit-scrollbar-thumb {
 background: linear-gradient(180deg, #ffffff, #ffffff);
 border-radius: 5px;
 border: 2px solid #1e1e1e;
}

.modal-content textarea::-webkit-scrollbar-thumb:hover {
 background: linear-gradient(180deg, #81d4fa, #ffffff);
}

/* Modal Actions (Buttons) */
.modal-actions {
 display: flex;
 gap: 12px;
 justify-content: flex-end;
 flex-wrap: wrap;
 margin-top: 20px;
}

/* Modal Animations */
@keyframes modalSlideIn {
 from {
     opacity: 0;
     transform: translateY(-60px) scale(0.95);
 }
 to {
     opacity: 1;
     transform: translateY(0) scale(1);
 }
}

/* Modal Close on Click Outside */
.modal-overlay::before {
 content: '';
 position: absolute;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 cursor: pointer;
}

.modal-content {
 position: relative;
 z-index: 1;
}

/* Validation Results Specific Styles */
#validation-results {
 flex: 1;
 overflow-y: auto;
 padding: 15px;
 background: #1e1e1e;
 border-radius: 8px;
 border: 1px solid #3e3e42;
 margin-bottom: 20px;
 min-height: 200px;
 max-height: 500px;
}

#validation-results::-webkit-scrollbar {
 width: 8px;
}

#validation-results::-webkit-scrollbar-track {
 background: #1e1e1e;
 border-radius: 4px;
}

#validation-results::-webkit-scrollbar-thumb {
 background: #ffffff;
 border-radius: 4px;
}

/* Responsive Modal */
@media (max-width: 768px) {
 .modal-content {
     width: 95%;
     padding: 20px;
     max-height: 90vh;
 }
 
 .modal-content h3 {
     font-size: 1.3em;
     margin-bottom: 20px;
 }
 
 .modal-content textarea {
     min-height: 350px;
     font-size: 12px;
     padding: 12px;
 }
 
 .modal-actions {
     flex-direction: column;
 }
 
 .modal-actions button {
     width: 100%;
 }
}

@media (max-width: 480px) {
 .modal-content {
     width: 98%;
     padding: 15px;
 }
 
 .modal-content h3 {
     font-size: 1.1em;
     flex-direction: column;
     align-items: flex-start;
     gap: 8px;
 }
 
 .modal-content textarea {
     min-height: 300px;
     font-size: 11px;
 }
}

/* Component Palette */
.component-palette {
display: flex;
flex-direction: column;
gap: 10px;
}

/* Palette Items */
.palette-item {
background: #1a1a1a;
color: var(--text-primary);
border: 1px solid #2a2a2a;
padding: 12px 15px;
font-size: 1em;
border-radius: 8px;
cursor: pointer;
transition: all 0.3s ease;
display: flex;
align-items: center;
gap: 12px;
font-weight: 500;
position: relative;
overflow: hidden;
}

.palette-item::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255, 140, 0, 0.1), transparent);
transition: left 0.5s ease;
}

.palette-item:hover::before {
left: 100%;
}

.palette-item:hover {
background: #222222;
border-color: #ff8c00;
transform: translateY(-2px);
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.palette-item:active {
transform: translateY(0);
}

.palette-item-icon {
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(255, 140, 0, 0.15);
border-radius: 6px;
border: 1px solid rgba(255, 140, 0, 0.25);
flex-shrink: 0;
transition: all 0.3s ease;
}

.palette-item:hover .palette-item-icon {
background: rgba(255, 140, 0, 0.25);
transform: scale(1.1);
}

.palette-item-icon i {
font-size: 1.4em;
color: #ff8c00;
}

.palette-item:hover .palette-item-icon i {
color: #ffa500;
}

.palette-item-content {
flex: 1;
display: flex;
flex-direction: column;
gap: 3px;
}

.palette-item-title {
font-weight: 600;
font-size: 0.95em;
color: var(--text-primary);
}

.palette-item-desc {
font-size: 0.75em;
color: var(--text-secondary);
line-height: 1.3;
}

.palette-item:hover .palette-item-desc {
color: #ff8c00;
}

/* Preview Badges */
.palette-preview-badge {
position: absolute;
top: 8px;
right: 8px;
background: #ff8c00;
color: #000000;
font-size: 0.65em;
padding: 3px 8px;
border-radius: 4px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.5px;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.palette-item:hover .palette-preview-badge {
background: #ffa500;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* Question Type Icon */
.question-type-icon {
display: inline-flex;
align-items: center;
gap: 6px;
font-size: 0.85em;
padding: 4px 10px;
background: rgba(255, 140, 0, 0.12);
border-radius: 6px;
border: 1px solid rgba(255, 140, 0, 0.25);
margin-top: 5px;
}

.question-type-icon i {
font-size: 1.1em;
color: #ff8c00;
}

/* Component Type Badge */
.component-type-badge {
position: absolute;
top: 10px;
left: 10px;
background: #ff8c00;
color: #000000;
font-size: 0.7em;
padding: 5px 10px;
border-radius: 6px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
opacity: 0;
transition: opacity 0.3s ease;
z-index: 5;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.survey-component:hover .component-type-badge,
.survey-component.selected .component-type-badge {
opacity: 1;
}

/* Canvas Container */
.canvas-container {
flex: 1;
background: #0a0a0a;
display: flex;
flex-direction: column;
overflow: hidden;
}

.canvas-header {
padding: 15px 20px;
background: #141414;
border-bottom: 1px solid #2a2a2a;
display: flex;
flex-wrap: wrap;
justify-content: space-between;
align-items: center;
gap: 10px 20px;
color: var(--text-secondary);
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.canvas-header h2 {
font-size: 1.2em;
color: #ff8c00;
flex-basis: 100%;
text-align: center;
font-weight: 700;
}

.survey-meta-controls {
display: flex;
flex-wrap: wrap;
gap: 10px 20px;
align-items: center;
flex-grow: 1;
justify-content: center;
}

.form-group-inline {
display: flex;
align-items: center;
gap: 8px;
}

.form-group-inline label {
margin-bottom: 0;
font-weight: 500;
color: #ff8c00;
font-size: 0.9em;
}

.form-group-inline input,
.form-group-inline select {
width: auto;
min-width: 150px;
padding: 6px 10px;
font-size: 0.9em;
height: 32px;
}

.form-group-inline select {
min-width: 120px;
}

#survey-canvas {
flex: 1;
overflow-y: auto;
background: #0a0a0a;
padding: 20px;
display: flex;
flex-direction: column;
gap: 20px;
position: relative;
}

/* Custom Scrollbar - Black & Orange */
#survey-canvas::-webkit-scrollbar,
.sidebar::-webkit-scrollbar,
.options-list::-webkit-scrollbar,
.sub-questions-list::-webkit-scrollbar {
width: 10px;
height: 10px;
}

#survey-canvas::-webkit-scrollbar-track,
.sidebar::-webkit-scrollbar-track,
.options-list::-webkit-scrollbar-track,
.sub-questions-list::-webkit-scrollbar-track {
background: #1a1a1a;
border-radius: 5px;
}

#survey-canvas::-webkit-scrollbar-thumb,
.sidebar::-webkit-scrollbar-thumb,
.options-list::-webkit-scrollbar-thumb,
.sub-questions-list::-webkit-scrollbar-thumb {
background: linear-gradient(180deg, #ff8c00, #cc6600);
border-radius: 5px;
border: 2px solid #1a1a1a;
}

#survey-canvas::-webkit-scrollbar-thumb:hover,
.sidebar::-webkit-scrollbar-thumb:hover,
.options-list::-webkit-scrollbar-thumb:hover,
.sub-questions-list::-webkit-scrollbar-thumb:hover {
background: linear-gradient(180deg, #ffa500, #ff8c00);
}

.survey-preview .placeholder-text {
color: var(--text-secondary);
text-align: center;
margin-top: 50px;
font-style: italic;
font-size: 1.1em;
}

/* Form Elements */
.form-group {
margin-bottom: 15px;
}

.form-group label {
display: block;
margin-bottom: 8px;
font-weight: 600;
color: #ff8c00;
font-size: 0.95em;
}

input[type="text"],
input[type="url"],
input[type="number"],
input[type="email"],
input[type="date"],
select,
textarea {
width: 100%;
padding: 10px 14px;
border: 1px solid #2a2a2a;
border-radius: 6px;
background: #1a1a1a;
color: var(--input-text);
font-size: 1em;
transition: all 0.3s ease;
}

input[type="text"]:focus,
input[type="url"]:focus,
input[type="number"]:focus,
input[type="email"]:focus,
input[type="date"]:focus,
select:focus,
textarea:focus {
border-color: #ff8c00;
outline: none;
background: #1f1f1f;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

textarea {
min-height: 80px;
resize: vertical;
}

input[type="checkbox"],
input[type="radio"] {
margin-right: 8px;
accent-color: #ff8c00;
}

/* Buttons */
.primary-button,
.secondary-button,
.delete-button,
.action-button {
padding: 10px 18px;
border-radius: 6px;
cursor: pointer;
font-weight: 600;
transition: all 0.3s ease;
font-size: 0.95em;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.primary-button {
background: linear-gradient(135deg, #ff8c00, #e67e00);
color: #ffffff;
border: 1px solid #ff8c00;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.primary-button:hover {
background: linear-gradient(135deg, #ffa500, #ff8c00);
transform: translateY(-2px);
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.primary-button:active {
transform: translateY(0);
}

.secondary-button {
background: #1a1a1a;
color: #ff8c00;
border: 1px solid #2a2a2a;
}

.secondary-button:hover {
background: #222222;
border-color: #ff8c00;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.delete-button {
background: linear-gradient(135deg, #dc3545, #c82333);
color: white;
border: 1px solid #dc3545;
box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.delete-button:hover {

const LoadingStates = {

showButtonLoading(button, loadingText = 'Loading...') {
    if (!button) return null;
    
    const originalContent = {
        html: button.innerHTML,
        disabled: button.disabled,
        classList: button.className
    };
    
    button.disabled = true;
    button.classList.add('loading');
    button.innerHTML = loadingText;
    
    return originalContent;
},

restoreButton(button, originalContent) {
    if (!button || !originalContent) return;
    
    button.innerHTML = originalContent.html;
    button.disabled = originalContent.disabled;
    button.className = originalContent.classList;
},
showModalLoading(modal, message = 'Processing...', subtext = '') {
    if (!modal) return;
    
    const modalContent = modal.querySelector('.modal-content');
    if (!modalContent) return;
    
    let overlay = modalContent.querySelector('.modal-loading-overlay');
    if (overlay) {
        const textEl = overlay.querySelector('.modal-loading-text');
        const subtextEl = overlay.querySelector('.modal-loading-subtext');
        if (textEl) textEl.textContent = message;
        if (subtextEl) subtextEl.textContent = subtext;
        return;
    }
    
    overlay = document.createElement('div');
    overlay.className = 'modal-loading-overlay';
    overlay.innerHTML = `
        <div class="modal-loading-spinner"></div>
        <div class="modal-loading-text">${message}</div>
        ${subtext ? `<div class="modal-loading-subtext">${subtext}</div>` : ''}
    `;
    
    modalContent.style.position = 'relative';
    modalContent.appendChild(overlay);
    modalContent.classList.add('loading');
},

hideModalLoading(modal) {

    const modalContent = modal.querySelector('.modal-content');
    if (!modalContent) return;
    
    const overlay = modalContent.querySelector('.modal-loading-overlay');
    if (overlay) {
        overlay.remove();
    }
    modalContent.classList.remove('loading');
},


async simulateProgress(callback, duration = 1000) {
    return new Promise((resolve) => {
        setTimeout(() => {
            const result = callback();
            resolve(result);
        }, duration);
    });
}
};

async function validateSurvey() {
const originalButtonState = LoadingStates.showButtonLoading(
    validateSurveyBtn,
    '<i class="fas fa-spinner fa-spin"></i> Validating...'
);

try {
    validationModal.classList.add('show');
    LoadingStates.showModalLoading(
        validationModal,
        'Validating Survey...',
        'Checking for errors and warnings'
    );

    await LoadingStates.simulateProgress(() => {
        const issues = [];
        const warnings = [];
        const successes = [];
        
        if (!surveyID) {
            issues.push({ msg: 'Survey ID is missing', detail: 'Enter a Survey ID in the canvas header' });
        } else {
            successes.push({ msg: 'Survey ID is set', detail: surveyID });
        }
        
        if (!selectedMarket) {
            issues.push({ msg: 'Market is not selected', detail: 'Select a market from the dropdown' });
        } else {
            successes.push({ msg: 'Market is selected', detail: selectedMarket });
        }
        
        if (!surveyConfig.header) {
            warnings.push({ msg: 'No header component', detail: 'Headers provide branding and context (recommended)' });
        } else {
            successes.push({ msg: 'Header component present', detail: null });
            if (!surveyConfig.header.text || surveyConfig.header.text.trim() === '' || surveyConfig.header.text === 'Your Survey Title Here') {
                warnings.push({ msg: 'Header text is default or empty', detail: 'Customize your header text' });
            }
        }
        
        const questions = getQuestions();
        if (questions.length === 0) {
            issues.push({ msg: 'No questions added to survey', detail: 'Add at least one question' });
        } else {
            successes.push({ msg: `${questions.length} question(s) added`, detail: null });

            const totalQuestionsWithSub = questions.length + 
                questions.reduce((sum, q) => sum + (q.subQuestions?.length || 0), 0);
            
            if (totalQuestionsWithSub > 10) {
                issues.push({ 
                    msg: `Total questions exceed limit: ${totalQuestionsWithSub}/10`, 
                    detail: 'AMPscript only supports option01-option10. Remove questions or modify AMPscript.' 
                });
            }
        }
        
        const ctaButtons = surveyConfig.components.filter(c => c.type === 'cta');
        if (ctaButtons.length === 0) {
            issues.push({ msg: 'No CTA button', detail: 'Form cannot be submitted without a CTA button' });
        } else {
            successes.push({ msg: `${ctaButtons.length} CTA button(s) present`, detail: ctaButtons[0].buttonText });
            
            ctaButtons.forEach((cta, idx) => {
                if (!cta.cloudPageNumber || cta.cloudPageNumber.trim() === '') {
                    warnings.push({ 
                        msg: `CTA button${idx > 0 ? ` ${idx + 1}` : ''}: CloudPage number not set`, 
                        detail: 'Set a Thank You CloudPage number in CTA properties. Users will be redirected to default page.' 
                    });
                } else {
                    successes.push({ msg: `CTA${idx > 0 ? ` ${idx + 1}` : ''}: Thank You CloudPage configured`, detail: `CloudPage #${cta.cloudPageNumber}` });
                }
            });
        }
        
        if (!surveyConfig.footer) {
            warnings.push({ msg: 'No footer component', detail: 'Footers are recommended for branding' });
        } else {
            successes.push({ msg: 'Footer component present', detail: null });
        }
        
        questions.forEach((q, index) => {
            const qNum = index + 1;
            
            if (!q.questionText || q.questionText.trim() === '' || q.questionText === 'New Question') {
                issues.push({ msg: `Question ${qNum}: Question text is empty or default`, detail: 'Provide meaningful question text' });
            }
            
            if (q.questionType === 'radio' || q.questionType === 'checkbox' || q.questionType === 'dropdown') {
                if (q.options.length === 0) {
                    issues.push({ msg: `Question ${qNum}: No options provided`, detail: 'Add at least one option' });
                } else if (q.options.length === 1) {
                    warnings.push({ msg: `Question ${qNum}: Only one option`, detail: 'Users have no choice to make' });
                }
            
                q.options.forEach((opt, optIndex) => {
                    if (!opt.text || opt.text.trim() === '') {
                        issues.push({ msg: `Question ${qNum}, Option ${optIndex + 1}: Empty option text`, detail: 'All options must have text' });
                    }
                });
            }
            
            if (q.subQuestions && q.subQuestions.length > 0) {
                q.subQuestions.forEach((sq, sqIndex) => {
                    const sqNum = `${qNum}.${sqIndex + 1}`;
                    
                    if (!sq.subQuestionText || sq.subQuestionText.trim() === '') {
                        issues.push({ msg: `Sub-question ${sqNum}: Empty text`, detail: 'Provide sub-question text' });
                    }
                    
                    if (sq.questionType === 'radio' || sq.questionType === 'checkbox' || sq.questionType === 'dropdown') {
                        if (sq.options.length === 0) {
                            issues.push({ msg: `Sub-question ${sqNum}: No options`, detail: 'Add at least one option' });
                        }
                        
                        sq.options.forEach((opt, optIndex) => {
                            if (!opt.text || opt.text.trim() === '') {
                                issues.push({ msg: `Sub-question ${sqNum}, Option ${optIndex + 1}: Empty text`, detail: 'All options must have text' });
                            }
                        });
                    }
                });
            }
        });
        
        const totalIssues = issues.length;
        const totalWarnings = warnings.length;
        const totalSuccesses = successes.length;
        
        let summaryHtml = `
            <div class="validation-summary-item ${totalIssues === 0 ? 'success' : 'error'}">
                <span class="count">${totalIssues}</span>
                <span class="label">Errors</span>
            </div>
            <div class="validation-summary-item warning">
                <span class="count">${totalWarnings}</span>
                <span class="label">Warnings</span>
            </div>
            <div class="validation-summary-item success">
                <span class="count">${totalSuccesses}</span>
                <span class="label">Passed</span>
            </div>
        `;
        validationSummary.innerHTML = summaryHtml;
        
        let resultsHtml = '';
        
        if (totalIssues === 0 && totalWarnings === 0) {
            resultsHtml += `
                <div class="validation-item success">
                    <i class="fas fa-check-circle"></i>
                    <div class="validation-item-content">
                        <strong>Perfect!</strong>
                        <div>Your survey passed all validation checks and is ready to deploy.</div>
                    </div>
                </div>`;
        }
        
        issues.forEach(issue => {
            resultsHtml += `
                <div class="validation-item error">
                    <i class="fas fa-times-circle"></i>
                    <div class="validation-item-content">
                        <strong>${issue.msg}</strong>
                        ${issue.detail ? `<div style="font-size:0.9em; margin-top:3px; opacity:0.9;">${issue.detail}</div>` : ''}
                    </div>
                </div>`;
        });
        
        warnings.forEach(warning => {
            resultsHtml += `
                <div class="validation-item warning">
                    <i class="fas fa-exclamation-triangle"></i>
                    <div class="validation-item-content">
                        <strong>${warning.msg}</strong>
                        ${warning.detail ? `<div style="font-size:0.9em; margin-top:3px; opacity:0.9;">${warning.detail}</div>` : ''}
                    </div>
                </div>`;
        });
        
        successes.forEach(success => {
            resultsHtml += `
                <div class="validation-item success">
                    <i class="fas fa-check"></i>
                    <div class="validation-item-content">
                        ${success.msg}
                        ${success.detail ? ` <span style="opacity:0.7;">- ${success.detail}</span>` : ''}
                    </div>
                </div>`;
        });
        
        validationResults.innerHTML = resultsHtml;
        
        return totalIssues === 0;
    }, 600);

    LoadingStates.hideModalLoading(validationModal);
    
} catch (error) {
    console.error('Validation Error:', error);
    LoadingStates.hideModalLoading(validationModal);
    showToast('❌ Error during validation. Check console.', 'error');
} finally {
    LoadingStates.restoreButton(validateSurveyBtn, originalButtonState);
}
}

function duplicateComponent(id) {
let component = null;

if (surveyConfig.header && surveyConfig.header.id === id) {
   showToast('Cannot duplicate header. Only one header allowed.', 'warning');
   return;
} else if (surveyConfig.footer && surveyConfig.footer.id === id) {
   showToast('Cannot duplicate footer. Only one footer allowed.', 'warning');
   return;
} else {
   const componentIndex = surveyConfig.components.findIndex(c => c.id === id);
   if (componentIndex !== -1) {
       component = surveyConfig.components[componentIndex];
   }
}

if (component) {
   const duplicated = JSON.parse(JSON.stringify(component));
   duplicated.id = generateUniqueId();
   
   if (component.type === 'question') {
       duplicated.questionText = duplicated.questionText + ' (Copy)';
       duplicated.options.forEach(opt => opt.id = generateUniqueId());
       
       if (duplicated.subQuestions && duplicated.subQuestions.length > 0) {
           duplicated.subQuestions.forEach(sq => {
               sq.id = generateUniqueId();
               sq.options.forEach(opt => opt.id = generateUniqueId());
           });
       }
   } else if (component.type === 'cta') {
       duplicated.buttonText = duplicated.buttonText + ' (Copy)';
   }
   
   const originalIndex = surveyConfig.components.findIndex(c => c.id === id);
   surveyConfig.components.splice(originalIndex + 1, 0, duplicated);
   
   renderCanvas();
   selectComponent(duplicated.id);
   showToast(`✅ ${component.type.charAt(0).toUpperCase() + component.type.slice(1)} duplicated successfully!`, 'success');
}
}

function hexToRgb(hex) {
let r = 0, g = 0, b = 0;
if (hex.length === 4) {
    r = parseInt(hex[1] + hex[1], 16);
    g = parseInt(hex[2] + hex[2], 16);
    b = parseInt(hex[3] + hex[3], 16);
} else if (hex.length === 7) {
    r = parseInt(hex.substring(1, 3), 16);
    g = parseInt(hex.substring(3, 5), 16);
    b = parseInt(hex.substring(5, 7), 16);
}
return `${r}, ${g}, ${b}`;
}

function hexToRgba(hex, alpha = 1) {
const rgb = hexToRgb(hex);
return `rgba(${rgb}, ${alpha})`;
}

function updateComponentProperty(id, propertyPath, value) {
let component;

if (surveyConfig.header && surveyConfig.header.id === id) {
    component = surveyConfig.header;
} else if (surveyConfig.ctaButton && surveyConfig.ctaButton.id === id) {
    component = surveyConfig.ctaButton;
} else if (surveyConfig.footer && surveyConfig.footer.id === id) {
    component = surveyConfig.footer;
} else {
    component = surveyConfig.components.find(c => c.id === id);
}

if (component) {
    const pathParts = propertyPath.split('.');
    let target = component;
    let parentTarget = null;
    let lastPart = '';

    for (let i = 0; i < pathParts.length; i++) {
        const part = pathParts[i];
        lastPart = part;
        if (i < pathParts.length - 1) {
            parentTarget = target;
            if (part.includes('[') && part.includes(']')) {
                const arrayName = part.split('[')[0];
                const index = parseInt(part.split('[')[1].replace(']', ''));
                target = target[arrayName][index];
            } else {
                target = target[part];
            }
        }
    }
    target[lastPart] = value;

    if (lastPart === 'questionType') {
        if (propertyPath === 'questionType') {
            resetQuestionOptions(component, value);
        } else if (propertyPath.startsWith('subQuestions[') && propertyPath.endsWith('.questionType')) {
            const subQuestionIndex = parseInt(propertyPath.split('[')[1].split(']')[0]);
            if (component.subQuestions[subQuestionIndex]) {
                resetQuestionOptions(component.subQuestions[subQuestionIndex], value);
            }
        }
    }

    renderCanvas();
    renderPropertiesPanel();
}
}

  questionObj.options = [{ id: generateUniqueId(), text: 'Option 1', customInput: false }];

  questionObj.inputType = 'text';
  questionObj.maxLength = null;
  questionObj.firstOptionText = 'Please select...';
  questionObj.minValue = 1;
  questionObj.maxValue = 5;
  questionObj.minLabel = 'Not satisfied';
  questionObj.maxLabel = 'Very satisfied';
  questionObj.minDate = '';
  questionObj.maxDate = '';
  questionObj.defaultDate = '';
  questionObj.conditionalLogic = preservedConditionalLogic;

  if (newType === 'rating') {
      questionObj.minValue = 1;
      questionObj.maxValue = 5;
      questionObj.minLabel = 'Not satisfied';
      questionObj.maxLabel = 'Very satisfied';
  } else if (newType === 'dropdown') {
      questionObj.firstOptionText = 'Please select...';
  } else if (newType === 'checkbox') {
      questionObj.maxSelectable = 1;
  }
}

function renderQuestionInput(questionObj, uniqueNamePrefix) {
            let inputHtml = '';

if (questionObj.questionType === 'none') {
    inputHtml = '<p style="font-size:0.9em; color:#666; font-style:italic;">No user input required for this question</p>';
    return inputHtml;
}
            switch (questionObj.questionType) {
                case 'radio':
                    questionObj.options.forEach(opt => {
                        inputHtml += `
                            <div>
                                <input type="radio" id="${uniqueNamePrefix}-${opt.id}" name="${uniqueNamePrefix}-option" disabled>
                                <label for="${uniqueNamePrefix}-${opt.id}">${opt.text}</label>
                                ${opt.customInput ? `<input type="text" placeholder="Enter custom text..." style="margin-left: 25px; width: calc(100% - 25px); margin-top: 5px;" disabled>` : ''}
                            </div>`;
                    });
                    break;
                case 'checkbox':
                    questionObj.options.forEach(opt => {
                        inputHtml += `
                            <div>
                                <input type="checkbox" id="${uniqueNamePrefix}-${opt.id}" name="${uniqueNamePrefix}-option" disabled>
                                <label for="${uniqueNamePrefix}-${opt.id}">${opt.text}</label>
                                ${opt.customInput ? `<input type="text" placeholder="Enter custom text..." style="margin-left: 25px; width: calc(100% - 25px); margin-top: 5px;" disabled>` : ''}
                            </div>`;
                    });
                    inputHtml += `<p style="font-size:0.8em; color: var(--text-secondary); margin-top: 5px;">Max selectable: ${questionObj.maxSelectable}</p>`;
                    break;
                case 'text':
                    inputHtml += `<input type="text" placeholder="${questionObj.placeholder}" disabled>`;
                    break;
                case 'dropdown':
                    inputHtml += `<select disabled><option>${questionObj.firstOptionText}</option>`;
                    questionObj.options.forEach(opt => {
                        inputHtml += `<option>${opt.text}</option>`;
                    });
                    inputHtml += `</select>`;
                    break;
                case 'date':
                    inputHtml += `<input type="date" disabled>`;
                    break;
                case 'rating':
                    inputHtml += `
                        <div style="display:flex; justify-content: space-around; margin-top: 10px;">`;
                    for (let i = questionObj.minValue; i <= questionObj.maxValue; i++) {
                        inputHtml += `
                            <div>
                                <input type="radio" id="${uniqueNamePrefix}-rating-${i}" name="${uniqueNamePrefix}-rating" disabled>
                                <label for="${uniqueNamePrefix}-rating-${i}">${i}</label>
                            </div>`;
                    }
                    inputHtml += `</div>
                        <div class="rating-scale-labels">
                            <span>${questionObj.minLabel}</span>
                            <span>${questionObj.maxLabel}</span>
                        </div>
                    `;
                    break;
            }
            return inputHtml;
        }

function renderTypeSpecificProperties(questionObj, parentComponentId, propertyPathPrefix = '') {
            let html = '';
            const path = propertyPathPrefix ? `${propertyPathPrefix}.` : '';

            if (questionObj.questionType === 'radio' || questionObj.questionType === 'checkbox' || questionObj.questionType === 'dropdown') {
                html += `
                    <div class="property-group">
                        <h4 style="font-size:1em; margin-bottom:10px;">Options</h4>
                        ${questionObj.questionType === 'checkbox' ? `
                            <div class="form-group">
                                <label for="${path}max-selectable-${questionObj.id}">Max selectable options:</label>
                                <input type="number" id="${path}max-selectable-${questionObj.id}" value="${questionObj.maxSelectable}" min="1"
                                       onchange="updateComponentProperty('${parentComponentId}', '${path}maxSelectable', parseInt(this.value))">
                            </div>
                        ` : ''}
                        ${questionObj.questionType === 'dropdown' ? `
                            <div class="form-group">
                                <label for="${path}dropdown-first-option-${questionObj.id}">First option text (e.g., "Select an option..."):</label>
                                <input type="text" id="${path}dropdown-first-option-${questionObj.id}" value="${questionObj.firstOptionText}"
                                       onchange="updateComponentProperty('${parentComponentId}', '${path}firstOptionText', this.value)">
                            </div>
                        ` : ''}

                        <div class="options-list">
                            ${questionObj.options.map((opt, index) => `
                                <div class="options-list-item">
                                    <input type="text" value="${opt.text}"
                                           onchange="updateComponentProperty('${parentComponentId}', '${path}options[${index}].text', this.value)">
                                    <label class="toggle-switch" title="Allow custom text input for this option">
                                        <input type="checkbox" ${opt.customInput ? 'checked' : ''}
                                               onchange="updateComponentProperty('${parentComponentId}', '${path}options[${index}].customInput', this.checked)">
                                        <span class="toggle-slider"></span>
                                    </label>
                                    <div class="option-actions">
                                        <button class="delete-option-btn" onclick="removeOption('${parentComponentId}', '${path}options', '${opt.id}')"><i class="fas fa-times"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button class="primary-button" onclick="addOption('${parentComponentId}', '${path}options')" style="margin-top: 15px;">
                            <i class="fas fa-plus"></i> Add Option
                        </button>
                    </div>
                `;
            } else if (questionObj.questionType === 'text') {
                html += `
                    <div class="property-group">
                        <h4 style="font-size:1em; margin-bottom:10px;">Text Input Settings</h4>
                        <div class="form-group">
                            <label for="${path}text-placeholder-${questionObj.id}">Placeholder Text:</label>
                            <input type="text" id="${path}text-placeholder-${questionObj.id}" value="${questionObj.placeholder}"
                                   onchange="updateComponentProperty('${parentComponentId}', '${path}placeholder', this.value)">
                        </div>
                        <div class="form-group">
                            <label for="${path}text-input-type-${questionObj.id}">Input Type:</label>
                            <select id="${path}text-input-type-${questionObj.id}" onchange="updateComponentProperty('${parentComponentId}', '${path}inputType', this.value)">
                                <option value="text" ${questionObj.inputType === 'text' ? 'selected' : ''}>Text</option>
                                <option value="email" ${questionObj.inputType === 'email' ? 'selected' : ''}>Email</option>
                                <option value="number" ${questionObj.inputType === 'number' ? 'selected' : ''}>Number</option>
                                <option value="tel" ${questionObj.inputType === 'tel' ? 'selected' : ''}>Phone</option>
                                <option value="url" ${questionObj.inputType === 'url' ? 'selected' : ''}>URL</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="${path}text-maxlength-${questionObj.id}">Max Length (optional):</label>
                            <input type="number" id="${path}text-maxlength-${questionObj.id}" value="${questionObj.maxLength || ''}" min="1"
                                   onchange="updateComponentProperty('${parentComponentId}', '${path}maxLength', parseInt(this.value) || null)">
                        </div>
                    </div>
                `;
            } else if (questionObj.questionType === 'date') {
                html += `
                    <div class="property-group">
                        <h4 style="font-size:1em; margin-bottom:10px;">Date Picker Settings</h4>
                        <div class="form-group">
                            <label for="${path}date-min-${questionObj.id}">Min Date:</label>

function addOption(componentId, optionsPath) {
ScrollManager.save('.sidebar.right-sidebar');
let component;
if (surveyConfig.header && surveyConfig.header.id === componentId) {
    component = surveyConfig.header;
} else if (surveyConfig.ctaButton && surveyConfig.ctaButton.id === componentId) {
    component = surveyConfig.ctaButton;
} else if (surveyConfig.footer && surveyConfig.footer.id === componentId) {
    component = surveyConfig.footer;
} else {
    component = surveyConfig.components.find(c => c.id === componentId);
}

if (component) {
    const pathParts = optionsPath.split('.');
    let optionsTarget = component;

    for (let i = 0; i < pathParts.length; i++) {
        const part = pathParts[i];
        if (part.includes('[') && part.includes(']')) {
            const arrayName = part.split('[')[0];
            const index = parseInt(part.split('[')[1].replace(']', ''));
            optionsTarget = optionsTarget[arrayName][index];
        } else {
            optionsTarget = optionsTarget[part];
        }
    }

    const newOption = {
        id: generateUniqueId(),
        text: `Option ${optionsTarget.length + 1}`,
        customInput: false
    };
    optionsTarget.push(newOption);
    const newIndex = optionsTarget.length - 1;
    renderPropertiesPanel();
    setTimeout(() => {
        const searchString = `${optionsPath}[${newIndex}].text`;
        const inputElement = document.querySelector(`input[onchange*="${searchString}"]`);
        
        if (inputElement) {
            const listItem = inputElement.closest('.options-list-item');
            if (listItem) {
                ScrollManager.scrollToNode(listItem);
                // Flash effect to highlight the new item
                listItem.style.transition = 'background 0.5s';
                listItem.style.background = 'rgba(255, 140, 0, 0.2)';
                setTimeout(() => listItem.style.background = '', 500);
                inputElement.focus();
            }
        }
    }, 50);

    showToast('Option added.', 'info', 1500);
} else {
    console.error('Component not found:', componentId);
    showToast('❌ Error: Component not found', 'error');
}
}

const FocusManager = {
savedState: null,

save() {
    const activeEl = document.activeElement;
    if (activeEl && document.getElementById('properties-panel').contains(activeEl)) {
        this.savedState = {
            id: activeEl.id,
            selectionStart: activeEl.selectionStart,
            selectionEnd: activeEl.selectionEnd,
            tagName: activeEl.tagName,
            type: activeEl.type
        };
    } else {
        this.savedState = null;
    }
},

restore() {
    if (!this.savedState) return;

    const el = document.getElementById(this.savedState.id);
    if (el) {
        el.focus();
        if (this.savedState.tagName === 'INPUT' || this.savedState.tagName === 'TEXTAREA') {
            const typesWithSelection = ['text', 'search', 'url', 'tel', 'password', 'textarea'];
            if (this.savedState.tagName === 'TEXTAREA' || typesWithSelection.includes(this.savedState.type)) {
                try {
                    el.setSelectionRange(this.savedState.selectionStart, this.savedState.selectionEnd);
                } catch (e) {
                }
            }
        }
    }
    this.savedState = null;
}
};

const ScrollManager = {
savedPositions: {},

save(elementSelector) {
    const element = document.querySelector(elementSelector);
    if (element) {
        this.savedPositions[elementSelector] = element.scrollTop;
    }
},

restore(elementSelector) {
    const element = document.querySelector(elementSelector);
    if (element && this.savedPositions[elementSelector] !== undefined) {
        element.scrollTop = this.savedPositions[elementSelector];
    }
},
scrollToNode(node, containerSelector = '.sidebar.right-sidebar') {
    const container = document.querySelector(containerSelector);
    if (!container || !node) return;
    
    setTimeout(() => {
        const containerRect = container.getBoundingClientRect();
        const nodeRect = node.getBoundingClientRect();
        const relativeTop = nodeRect.top - containerRect.top;
        const currentScroll = container.scrollTop;

        container.scrollTo({
            top: currentScroll + relativeTop - 100,
            behavior: 'smooth'
        });
    }, 50);
}
};

                 data-is-subquestion="${isSubQuestion}"
                 onchange="handleDropdownChange(this, ${isSubQuestion})"
                 style="${inputStyle} background-color:#ffffff;">
             <option value="" disabled selected hidden>${firstOptionText}</option>`;
         questionObj.options.forEach(opt => {
             inputHtml += `
             <option value="${opt.text}">${opt.text}</option>`;
         });
         inputHtml += `
         </select>`;
         break;
         
     case 'date':
         const minDateAttr = questionObj.minDate ? `min="${questionObj.minDate}"` : '';
         const maxDateAttr = questionObj.maxDate ? `max="${questionObj.maxDate}"` : '';
         const defaultDateAttr = questionObj.defaultDate ? `value="${questionObj.defaultDate}"` : '';
         inputHtml += `
         <input type="date" 
                id="${fieldName}" 
                name="${fieldName}" 
                ${minDateAttr} 
                ${maxDateAttr} 
                ${defaultDateAttr} 
                ${requiredAttr} 
                data-is-subquestion="${isSubQuestion}"
                style="${inputStyle}">`;
         break;
         
     case 'rating':
         inputHtml += `
         <div class="rating-container" style="margin-top:15px;">
             <div class="rating-options" style="text-align:center; margin:0 auto; max-width:400px;">`;
         
         for (let i = questionObj.minValue; i <= questionObj.maxValue; i++) {
             inputHtml += `
                 <div class="rating-item" style="display:inline-block; padding:0 8px; text-align:center;">
                     <input type="radio" 
                            id="${fieldName}_rating_${i}" 
                            name="${fieldName}" 
                            value="${i}" 
                            ${requiredAttr}
                            data-is-subquestion="${isSubQuestion}"
                            onchange="handleRadioChange(this, null, '${fieldName}', ${isSubQuestion})"
                            style="display:block; margin:0 auto 5px auto;">
                     <label for="${fieldName}_rating_${i}" style="display:block; font-size:14px; color:#333333; cursor:pointer;">${i}</label>
                 </div>`;
         }
         
         inputHtml += `
             </div>
             <div class="rating-labels" style="display:flex; justify-content:space-between; max-width:400px; margin:10px auto 0; font-size:11px; color:#666666;">
                 <span>${questionObj.minLabel}</span>
                 <span>${questionObj.maxLabel}</span>
             </div>
         </div>`;
         break;
 }
 
 return inputHtml;
}

function getFieldNameByPosition(targetId) {
let mainQuestionIndex = 0;

for (let comp of surveyConfig.components) {
    if (comp.type === 'question') {
        mainQuestionIndex++; 
        const mainFieldNum = String(mainQuestionIndex).padStart(2, '0');
        
        // Check if this is the parent question
        if (comp.id === targetId) {
            return `option${mainFieldNum}`;
        }

        // Check if this is a sub-question
        if (comp.subQuestions && comp.subQuestions.length > 0) {
            for (let subIdx = 0; subIdx < comp.subQuestions.length; subIdx++) {
                const sq = comp.subQuestions[subIdx];
                const compositeId = `${comp.id}-${sq.id}`;
                
                if (compositeId === targetId) {
                    // ✅ FIX: Always give sub-questions unique suffix
                    return `option${mainFieldNum}_sub${subIdx + 1}`;
                }
            }
        }
    }
}

return null;
}

function generateConditionalLogicJS() {
let js = '';
let initializationJS = '';
let allUpdateFunctions = [];

getQuestions().forEach((q, qIdx) => {
    const currentFieldName = getFieldNameByPosition(q.id);
    
    if (q.conditionalLogic?.enabled && q.conditionalLogic.targetQuestionId && q.conditionalLogic.targetOption) {
        const targetQ = getQuestions().find(tq => tq.id === q.conditionalLogic.targetQuestionId);
        if (!targetQ) return;
        
        const targetFieldName = getFieldNameByPosition(targetQ.id);
        const funcName = `updateQuestion_${q.id.replace(/-/g, '_')}`;
        allUpdateFunctions.push(funcName);

        initializationJS += `
// Hide Question: ${q.questionText}
var question_div_${q.id.replace(/-/g, '_')} = document.querySelector('div[data-question-id="${q.id}"]');
if (question_div_${q.id.replace(/-/g, '_')}) {
question_div_${q.id.replace(/-/g, '_')}.style.display = 'none';
}
`;
        
        js += `
// Conditional Question: ${q.questionText}
function ${funcName}() {
var target_q = document.querySelector('input[name="${targetFieldName}"]:checked:not([data-is-subquestion="true"]), select[name="${targetFieldName}"]:not([data-is-subquestion="true"])');
var question_div = document.querySelector('div[data-question-id="${q.id}"]');
if (question_div) {
    var targetValue = target_q?.value || '';
    var shouldShow = (targetValue === "${q.conditionalLogic.targetOption}");
    
    if (shouldShow && question_div.style.display === 'none') {
        question_div.style.display = '';
        resetFormInputsInContainer(question_div);
        
        ${q.subQuestions && q.subQuestions.length > 0 ? 
            q.subQuestions.map(sq => `
        if (typeof updateSubQuestion_${sq.id.replace(/-/g, '_')} === 'function') {
            updateSubQuestion_${sq.id.replace(/-/g, '_')}();
        }`).join('') 
            : ''}
    } else if (!shouldShow && question_div.style.display !== 'none') {
        question_div.style.display = 'none';
    }
}
}
`;
    }
    
    if (q.subQuestions && q.subQuestions.length > 0) {
        q.subQuestions.forEach((sq, sqIdx) => {
            const compositeId = `${q.id}-${sq.id}`;
            const subQFieldName = getFieldNameByPosition(compositeId);
            const parentFieldName = getFieldNameByPosition(q.id);
            
            if (sq.conditionalLogic?.enabled && sq.conditionalLogic.targetOptionIndex !== null) {
                const parentOptionIndex = sq.conditionalLogic.targetOptionIndex;
                const parentOption = q.options[parentOptionIndex];
                
                if (parentOption) {
                    const parentOptionId = `${parentFieldName}_${parentOption.id}`;
                    const funcName = `updateSubQuestion_${sq.id.replace(/-/g, '_')}`;
                    allUpdateFunctions.push(funcName);
                    
                    initializationJS += `
// Hide Sub-Question: ${sq.subQuestionText}
var subQ_container_${sq.id.replace(/-/g, '_')} = document.querySelector('div[data-subquestion-id="${sq.id}"]');
if (subQ_container_${sq.id.replace(/-/g, '_')}) {
subQ_container_${sq.id.replace(/-/g, '_')}.style.display = 'none';
}
`;
                    
                    js += `
// Conditional Sub-Question: ${sq.subQuestionText}
function ${funcName}() {
var parentOpt = document.getElementById('${parentOptionId}');
var subQ_container = document.querySelector('div[data-subquestion-id="${sq.id}"]');

if (subQ_container && parentOpt) {
    var shouldShow = parentOpt.checked;
    
    if (shouldShow && subQ_container.style.display === 'none') {
        subQ_container.style.display = 'block';
        resetFormInputsInContainer(subQ_container);
    } else if (!shouldShow && subQ_container.style.display !== 'none') {
        subQ_container.style.display = 'none';
    }
}
}
`;
                }
            }
        });
    }
});


let eventListenersJS = '';

getQuestions().forEach((q) => {
    if (q.conditionalLogic?.enabled && q.conditionalLogic.targetQuestionId) {
        const targetQ = getQuestions().find(tq => tq.id === q.conditionalLogic.targetQuestionId);
        if (targetQ) {
            const targetFieldName = getFieldNameByPosition(targetQ.id);
            const funcName = `updateQuestion_${q.id.replace(/-/g, '_')}`;
            
            eventListenersJS += `
document.querySelectorAll('input[name="${targetFieldName}"]:not([data-is-subquestion="true"]), select[name="${targetFieldName}"]:not([data-is-subquestion="true"])').forEach(function(el) {
el.addEventListener('change', ${funcName});
});
${funcName}();
`;
        }
    }
    
    if (q.subQuestions && q.subQuestions.length > 0) {
        const parentFieldName = getFieldNameByPosition(q.id);
        
        q.subQuestions.forEach((sq) => {
            if (sq.conditionalLogic?.enabled && sq.conditionalLogic.targetOptionIndex !== null) {
                const parentOption = q.options[sq.conditionalLogic.targetOptionIndex];
                
                if (parentOption) {
                    const parentOptionId = `${parentFieldName}_${parentOption.id}`;
                    const funcName = `updateSubQuestion_${sq.id.replace(/-/g, '_')}`;
                    
                    eventListenersJS += `
var parentOpt_${sq.id.replace(/-/g, '_')} = document.getElementById('${parentOptionId}');
if (parentOpt_${sq.id.replace(/-/g, '_')}) {
parentOpt_${sq.id.replace(/-/g, '_')}.addEventListener('change', ${funcName});
}

document.querySelectorAll('input[name="${parentFieldName}"]:not([data-is-subquestion="true"])').forEach(function(el) {
if (el.id !== '${parentOptionId}') {
    el.addEventListener('change', ${funcName});
}
});

${funcName}();
`;
                }
            }
        });
    }
});

return initializationJS + '\n' + js + '\n' + eventListenersJS;
}

                answerVariables += `SET @answer${answerNum}_parent_custom = RequestParameter('option${mainFieldNum}_custom')\n\n`;

                answerVariables += `ENDIF\n\n`;
            }
            
            // ✅ FIX 2: Then capture sub-questions with correct field names
            const subQuestionCount = q.subQuestions.length;
            for (let subIdx = 0; subIdx < subQuestionCount; subIdx++) {
                const sq = q.subQuestions[subIdx];

                    answerVariables += `

SET @answer${answerNum}_${subIdx + 1}_custom = RequestParameter('${paramName}_custom')

                    answerVariables += `ENDIF\n\n`;

            }
            
            // ✅ FIX 3: Concatenate PARENT + all sub-questions

                Array.from({ length: subQuestionCount }, (_, i) => `@answer${answerNum}_${i + 1}`)

<script>
(function() {
'use strict';

console.log('Survey form initializing...');
var manuallyDisabledInputs = new Set();
window.handleRadioChange = function(radio, customInputWrapperId, radioGroupName, isSubQuestion) {

if (customInputWrapperId) {
    toggleCustomInput(customInputWrapperId, radioGroupName);
}

if (!isSubQuestion) {

}
};

window.handleCheckboxChange = function(checkbox, groupClass, maxSelectable, customInputWrapperId, isSubQuestion) {
validateCheckboxMax(checkbox, groupClass, maxSelectable);

if (customInputWrapperId) {
    toggleCustomInputCheckbox(customInputWrapperId, checkbox.checked);
}
};

window.validateCheckboxMax = function(checkbox, groupClass, maxSelectable) {
var visibleCheckboxes = Array.from(document.querySelectorAll('.' + groupClass)).filter(function(cb) {
    var container = cb.closest('div[data-question-id], div[data-subquestion-id]');
    return !container || container.style.display !== 'none';
});

var checkedCount = visibleCheckboxes.filter(function(cb) { return cb.checked; }).length;

visibleCheckboxes.forEach(function(cb) {
    if (checkedCount >= maxSelectable && !cb.checked) {
        cb.disabled = true;
        manuallyDisabledInputs.add(cb.id);
        var label = document.querySelector('label[for="' + cb.id + '"]');
        if (label) {
            label.style.opacity = '0.5';
            label.style.cursor = 'not-allowed';
        }
    } else {
        if (!manuallyDisabledInputs.has(cb.id) || checkedCount < maxSelectable) {
            cb.disabled = false;
            manuallyDisabledInputs.delete(cb.id);
            var label = document.querySelector('label[for="' + cb.id + '"]');
            if (label) {
                label.style.opacity = '1';
                label.style.cursor = 'pointer';
            }
        }
    }
});
};

window.toggleCustomInput = function(customInputWrapperId, radioGroupName) {
var allRadios = document.querySelectorAll('input[name="' + radioGroupName + '"]');
allRadios.forEach(function(radio) {
    var wrapperId = radio.id + '_custom_wrapper';
    var wrapper = document.getElementById(wrapperId);
    if (wrapper) {
        wrapper.style.display = 'none';
        var input = wrapper.querySelector('input[type="text"]');
        if (input && !radio.checked) {
            input.value = '';
        }
    }
});

var selectedWrapper = document.getElementById(customInputWrapperId);
if (selectedWrapper) {
    selectedWrapper.style.display = 'block';
    var input = selectedWrapper.querySelector('input[type="text"]');
    if (input) {
        setTimeout(function() { input.focus(); }, 100);
    }
}
};

window.toggleCustomInputCheckbox = function(customInputWrapperId, isChecked) {
var wrapper = document.getElementById(customInputWrapperId);
if (wrapper) {
    wrapper.style.display = isChecked ? 'block' : 'none';
    var input = wrapper.querySelector('input[type="text"]');
    if (input) {
        if (isChecked) {
            setTimeout(function() { input.focus(); }, 100);
        } else {
            input.value = '';
        }
    }
}
};

function resetFormInputsInContainer(container) {
if (!container) return;

var radios = container.querySelectorAll('input[type="radio"]');
radios.forEach(function(radio) {
    radio.disabled = false;
});

var checkboxGroups = {};
var checkboxes = container.querySelectorAll('input[type="checkbox"]');
checkboxes.forEach(function(cb) {
    var groupClass = Array.from(cb.classList).find(function(cls) {
        return cls.startsWith('checkbox-group-');
    });
    
    if (groupClass) {
        if (!checkboxGroups[groupClass]) {
            checkboxGroups[groupClass] = [];
        }
        checkboxGroups[groupClass].push(cb);
    }
    
    manuallyDisabledInputs.delete(cb.id);
    cb.disabled = false;
    
    var label = document.querySelector('label[for="' + cb.id + '"]');
    if (label) {
        label.style.opacity = '1';
        label.style.cursor = 'pointer';
    }
});

Object.keys(checkboxGroups).forEach(function(groupClass) {
    var firstCheckbox = checkboxGroups[groupClass][0];
    if (firstCheckbox) {
        var maxSelectable = parseInt(firstCheckbox.dataset.maxSelectable) || 999;
        validateCheckboxMax(firstCheckbox, groupClass, maxSelectable);
    }
});

var otherInputs = container.querySelectorAll('input[type="text"], input[type="email"], input[type="number"], input[type="tel"], input[type="url"], input[type="date"], select, textarea');
otherInputs.forEach(function(input) {
    input.disabled = false;
});
}

window.validateForm = function() {
var form = document.getElementById('surveyForm');
if (!form) return false;

var isValid = true;
var firstError = null;
var errorMessages = [];

var requiredFields = form.querySelectorAll('[required]');
var processedRadioGroups = new Set();
var processedCheckboxGroups = new Set();

requiredFields.forEach(function(field) {
    var container = field.closest('div[data-question-id], div[data-subquestion-id]');
    if (container && container.style.display === 'none') {
        return;
    }
    
    if (field.type === 'radio') {
        var radioName = field.name;
        if (processedRadioGroups.has(radioName)) return;
        processedRadioGroups.add(radioName);
        
        var anyChecked = form.querySelector('input[name="' + radioName + '"]:checked');
        if (!anyChecked) {
            isValid = false;
            var radios = form.querySelectorAll('input[name="' + radioName + '"]');
            radios.forEach(function(r) {
                var label = document.querySelector('label[for="' + r.id + '"]');
                if (label) label.style.color = '#dc3545';
            });
            if (!firstError) firstError = field;
            
            var questionDiv = field.closest('div[data-question-id], div[data-subquestion-id]');
            if (questionDiv) {
                var questionText = questionDiv.querySelector('.question-text, p[style*="font-weight:bold"], p[style*="font-weight:600"]');
                if (questionText) {
                    errorMessages.push(questionText.textContent.trim().replace('*', ''));
                }
            }
        }
    } 
    else if (field.type === 'checkbox') {
        var checkboxName = field.name.replace('[]', '');
        if (processedCheckboxGroups.has(checkboxName)) return;
        processedCheckboxGroups.add(checkboxName);
        
        var visibleCheckboxes = Array.from(form.querySelectorAll('input[name^="' + checkboxName + '"]')).filter(function(cb) {
            var container = cb.closest('div[data-question-id], div[data-subquestion-id]');
            return !container || container.style.display !== 'none';
        });
        
        var anyChecked = visibleCheckboxes.some(function(cb) { return cb.checked; });
        
        if (!anyChecked && visibleCheckboxes.length > 0) {
            isValid = false;
            visibleCheckboxes.forEach(function(cb) {
                var label = document.querySelector('label[for="' + cb.id + '"]');
                if (label) label.style.color = '#dc3545';
            });
            if (!firstError) firstError = visibleCheckboxes[0];
            
            var questionDiv = visibleCheckboxes[0].closest('div[data-question-id], div[data-subquestion-id]');
            if (questionDiv) {
                var questionText = questionDiv.querySelector('.question-text, p[style*="font-weight:bold"], p[style*="font-weight:600"]');
                if (questionText) {
                    errorMessages.push(questionText.textContent.trim().replace('*', ''));
                }
            }
        }
    } 
    else {
        if (!field.value || field.value.trim() === '') {
            isValid = false;
            field.style.borderColor = '#dc3545';
            if (!firstError) firstError = field;
            
            var questionDiv = field.closest('div[data-question-id], div[data-subquestion-id]');
            if (questionDiv) {
                var questionText = questionDiv.querySelector('.question-text, p[style*="font-weight:bold"], p[style*="font-weight:600"]');
                if (questionText) {
                    errorMessages.push(questionText.textContent.trim().replace('*', ''));
                }
            }
        } else {
            field.style.borderColor = '#cccccc';
        }
    }
});

if (!isValid) {
    var errorMsg = 'Please fill in all required fields.';
    if (errorMessages.length > 0) {
        errorMsg += '\\n\\nMissing:\\n• ' + errorMessages.slice(0, 5).join('\\n• ');
        if (errorMessages.length > 5) {
            errorMsg += '\\n• ... and ' + (errorMessages.length - 5) + ' more';
        }
    }
    alert(errorMsg);
    
    if (firstError) {
        firstError.focus();
        firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    return false;
}

var submitBtn = form.querySelector('button[type="submit"]');
if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.6';
    submitBtn.textContent = 'Submitting...';
}

return true;
};

document.addEventListener('DOMContentLoaded', function() {
console.log('DOM loaded, initializing conditional logic...');

${generateConditionalLogicJS()}

console.log('Conditional logic initialized');

var form = document.getElementById('surveyForm');
if (form) {
    form.addEventListener('input', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
            if (e.target.value && e.target.value.trim() !== '') {
                e.target.style.borderColor = '#cccccc';
            }
            
            if (e.target.type === 'radio') {
                var radioName = e.target.name;
                var allRadios = form.querySelectorAll('input[name="' + radioName + '"]');
                allRadios.forEach(function(r) {
                    var label = document.querySelector('label[for="' + r.id + '"]');
                    if (label) label.style.color = '';
                });
            }
            
            if (e.target.type === 'checkbox') {
                var label = document.querySelector('label[for="' + e.target.id + '"]');
                if (label) label.style.color = '';
            }
        }
    });
    
    var formSubmitted = false;
    form.addEventListener('submit', function(e) {
        if (formSubmitted) {
            e.preventDefault();
            return false;
        }
        formSubmitted = true;
    });
}
});

})();
<\/script>

function updateComponentStats() {
const totalComponents = 
   (surveyConfig.header ? 1 : 0) + 
   surveyConfig.components.length + 
   (surveyConfig.footer ? 1 : 0);

const questions = getQuestions();
const totalQuestions = questions.length + 
   questions.reduce((sum, q) => sum + (q.subQuestions?.length || 0), 0);

const totalComponentsEl = document.getElementById('total-components');
const totalQuestionsEl = document.getElementById('total-questions');

if (totalComponentsEl) totalComponentsEl.textContent = totalComponents;
if (totalQuestionsEl) {
   totalQuestionsEl.textContent = totalQuestions;
   if (totalQuestions > 10) {
       totalQuestionsEl.style.color = '#dc3545';
       totalQuestionsEl.parentElement.style.fontWeight = 'bold';
   } else {
       totalQuestionsEl.style.color = 'var(--text-primary)';
       totalQuestionsEl.parentElement.style.fontWeight = 'normal';
   }
}
}

function getQuestionTypeIcon(type) {
const icons = {
    'radio': '<i class="fas fa-dot-circle"></i>',
    'checkbox': '<i class="fas fa-check-square"></i>',
    'text': '<i class="fas fa-keyboard"></i>',
    'dropdown': '<i class="fas fa-caret-square-down"></i>',
    'date': '<i class="fas fa-calendar-alt"></i>',
    'rating': '<i class="fas fa-star"></i>'
};
return icons[type] || '<i class="fas fa-question"></i>';
}

function getQuestionTypeName(type) {
const names = {
    'radio': 'Radio Button',
    'checkbox': 'Checkbox',
    'text': 'Text Input',
    'dropdown': 'Dropdown',
    'date': 'Date Picker',
    'rating': 'Rating Scale'
};
return names[type] || type;
}

async function downloadHtml() {
  const htmlContent = generatedHtmlTextarea.value;
  if (!htmlContent) {
      showToast('No HTML to download.', 'warning');
      return;
  }

  const originalButtonState = LoadingStates.showButtonLoading(
      downloadHtmlBtn,
      '<i class="fas fa-spinner fa-spin"></i> Preparing...'
  );

  try {
      await LoadingStates.simulateProgress(() => {
          const filename = `${surveyID || 'survey'}-${selectedMarket || 'general'}-sfmc.html`;
          const blob = new Blob([htmlContent], { type: 'text/html' });
          const url = URL.createObjectURL(blob);

          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
      }, 400);

      showToast('📥 HTML file downloaded successfully!', 'success');
      
  } catch (error) {
      console.error('Download Error:', error);
      showToast('❌ Error downloading file. Check console.', 'error');
  } finally {
      LoadingStates.restoreButton(downloadHtmlBtn, originalButtonState);
  }
}
