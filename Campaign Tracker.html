<div class="hr"><span class="pill p-off" id="sP">Offline</span><div class="tabs"><button class="tab on" id="vL">List</button><button class="tab" id="vT">Timeline</button></div><button class="cta cta-g" id="bUp">⬆ Upload</button><button class="ib" id="bSy" title="Download from Sheet">⬇️</button><div style="position:relative"><button class="ib" id="bBl">🔔<span class="bb" id="bB">0</span></button><div class="np" id="nP"><div class="nph"><span>Notifications</span><button class="cic" id="nX">✕</button></div><div id="nB"></div></div></div><button class="ib" id="bTh">🌙</button><button class="ib" id="bSe">⚙️</button><button class="cta cta-o" id="bNw">+ New Campaign</button></div></header>
<div class="stats"><div class="sc"><div class="scl">Campaigns</div><div class="scv" id="s0" style="color:var(--o)">0</div></div><div class="sc"><div class="scl">Touchpoints</div><div class="scv" id="s1" style="color:var(--bl)">0</div></div><div class="sc"><div class="scl">Checked</div><div class="scv" id="s2" style="color:var(--ok)">0</div></div><div class="sc"><div class="scl">Pending</div><div class="scv" id="s3" style="color:var(--wn)">0</div></div></div>
<div class="tbar"><div class="srw"><span class="sri">🔍</span><input class="sinp" id="qI" placeholder="Search campaigns, CL codes, markets..."></div><select class="sel" id="fTy"><option value="">All Types</option><option>EE</option><option>WA</option><option>R2D</option><option>EESS</option><option>WASS</option><option>WEB</option><option>ESS</option><option>WASS-UJ</option></select><select class="sel" id="fSt"><option value="">All Status</option><option>Pending</option><option>Checked</option><option>Overdue</option></select><select class="sel" id="fSo"><option value="newest">Newest</option><option value="oldest">Oldest</option><option value="name">Name</option><option value="progress">Progress</option></select></div>
<div class="cnt" id="lV"><div id="cL"></div></div><div class="tlv" id="tV"></div>
<div class="mo" id="moS"><div class="md"><div class="mt">⚙️ Settings</div><div class="fg"><label class="fl">Your Name *</label><input class="fi" id="cN" placeholder="Enter your name"></div><div class="fg"><label class="fl">Sync URL</label><input class="fi" id="cU"><div class="fh">Google Apps Script Web App URL</div></div><div class="fr"><button class="fb fb-s" id="msX">Cancel</button><button class="fb fb-p" id="msS">Save Settings</button></div></div></div>
<div class="mo" id="moC"><div class="md"><div class="mt" id="mcT">New Campaign</div><input type="hidden" id="eId"><div class="fg"><label class="fl">JIRA ID</label><input class="fi" id="fJ" placeholder="12345 or WUNNED-12345"><div class="fh">Auto-formats to full JIRA URL</div></div><div class="fg"><label class="fl">Owner</label><input class="fi" id="fOw" placeholder="Campaign owner"></div><div class="fg"><label class="fl">Reviewer</label><input class="fi" id="fRv" placeholder="Campaign reviewer"></div><div class="fg"><label class="fl">Campaign Name</label><input class="fi" id="fNm" placeholder="Type name — auto-detects type &amp; market"><div class="fh">Type and market detected from name tokens</div></div><div class="fg"><label class="fl">Campaign Type <span class="fau" id="tAB" style="display:none">⚡ Auto</span></label><input class="fi" id="fTp" list="tyL" placeholder="Select or type custom"><datalist id="tyL"><option value="EE"></option><option value="WA"></option><option value="R2D"></option><option value="EESS"></option><option value="WASS"></option><option value="WEB"></option><option value="ESS"></option><option value="WASS-UJ"></option></datalist></div><div class="fg"><label class="fl">Market <span class="fau" id="mAB" style="display:none">⚡ Auto</span></label><input class="fi" id="fMk" list="mkL" placeholder="Auto-detected or type"><datalist id="mkL"></datalist></div><div class="fg"><label class="fl">Notes</label><textarea class="fta" id="fNt" placeholder="Optional notes"></textarea></div><div class="fr"><button class="fb fb-s" id="mcX">Cancel</button><button class="fb fb-p" id="mcS">Save Campaign</button></div></div></div>
<div class="mo" id="moT"><div class="md"><div class="mt">Add Touchpoint</div><input type="hidden" id="tCd"><div id="tpS"><div class="fg"><label class="fl">CL Code</label><input class="fi" id="fCL" placeholder="NX-IN-SLB-EML-260001"></div><div class="fg"><label class="fl">Deploy Date</label><input type="date" class="fi" id="fDt"></div><div class="fg"><label class="fl">Status</label><select class="fsl" id="fSs"><option>Pending</option><option>Checked</option></select></div></div><div id="tpB" class="hidden"><div class="fg"><label class="fl">CL Codes (one per line)</label><textarea class="fbk" id="fBC" placeholder="NX-IN-SLB-EML-260001
NX-PK-SLB-EML-260002"></textarea></div><div class="fg"><label class="fl">Default Date</label><input type="date" class="fi" id="fBD"></div></div><div style="margin:10px 0"><button class="fb fb-s" id="bBk" style="font-size:11px;padding:7px 14px">⚡ Switch to Bulk Mode</button></div><div class="fr"><button class="fb fb-s" id="mtX">Cancel</button><button class="fb fb-ok" id="mtA">+ Save &amp; Add Another</button><button class="fb fb-p" id="mtS">Save &amp; Close</button></div></div></div>
<div class="ta" id="tA"></div>


<script>
(function(){
const DU='GoogleSheetURL';
const cfg=(k,v)=>{if(v!==undefined)try{localStorage.setItem('g_'+k,v)}catch(e){}try{return localStorage.getItem('g_'+k)||''}catch(e){return''}};
if(!cfg('url'))cfg('url',DU);
let D=[],bm=false;
const KT=['EE','WA','R2D','EESS','WASS','WEB','ESS','WASS-UJ'];
const MC={'DZ':'Algeria','AR':'Argentina','BY':'Belarus','BR':'Brazil','CL':'Chile','CO':'Colombia','CR':'Costa Rica','DO':'Dominican Republic','EC':'Ecuador','EG':'Egypt','SV':'El Salvador','GT':'Guatemala','GF':'Gulf','GU':'Gulf','HN':'Honduras','IN':'India','ID':'Indonesia','JM':'Jamaica','JO':'Jordan','KZ':'Kazakhstan','KE':'Kenya','LB':'Lebanon','MY':'Malaysia','MX':'Mexico','MA':'Morocco','NG':'Nigeria','PK':'Pakistan','PA':'Panama','PE':'Peru','PH':'Philippines','RU':'Russia','SA':'Saudi Arabia','LK':'Sri Lanka','TH':'Thailand','TT':'Trinidad and Tobago','TN':'Tunisia','TR':'Turkey','UA':'Ukraine','UY':'Uruguay','VN':'Vietnam','VE':'Venezuela'};
const AM=Object.values(MC).filter((v,i,a)=>a.indexOf(v)===i).sort();
const stableId=jira=>{const m=jira.match(/WUNNED-\d+/);return m?m[0]:'c_'+Math.abs([...jira].reduce((h,c)=>((h<<5)-h)+c.charCodeAt(0),0)).toString(36);};
const tokenize=n=>n.toUpperCase().split(/[\s_\-\/\.]+/).filter(Boolean);
function dType(n){const tk=tokenize(n),lo=n.toLowerCase();if(lo.includes('ujwizard')){if(tk.includes('WA')||tk.includes('WASS'))return'WASS-UJ';if(tk.includes('EE')||tk.includes('ESS')||tk.includes('EML'))return'ESS';}if(tk.includes('EESS'))return'EESS';if(tk.includes('WASS'))return'WASS';if(tk.includes('ESS'))return'ESS';if(tk.includes('R2D'))return'R2D';if(tk.includes('WA'))return'WA';if(tk.includes('EE')||tk.includes('EML'))return'EE';if(tk.includes('WEB'))return'WEB';if(lo.includes('whatsapp'))return'WA';if(lo.includes('email engagement'))return'EE';if(lo.includes('webinar'))return'WEB';return'';}
function dMarket(n){const tk=tokenize(n);for(const t of tk)if(MC[t])return{code:t,name:MC[t]};return null;}
const fJ=v=>{v=v.trim();if(v.startsWith('http')){const m=v.match(/WUNNED-\d+/);return m?'https://jira.uhub.biz/browse/'+m[0]:v;}if(v.startsWith('WUNNED-'))return'https://jira.uhub.biz/browse/'+v;return'https://jira.uhub.biz/browse/WUNNED-'+v.replace(/\D/g,'');};
const dJ=u=>{const m=u.match(/WUNNED-\d+/);return m?m[0]:u;};
const isOD=tp=>tp.status!=='Checked'&&tp.deployDate&&new Date(tp.deployDate)<new Date(new Date().toDateString());
const isTD=tp=>tp.deployDate&&new Date(tp.deployDate).toDateString()===new Date().toDateString();
const isUp=tp=>{if(!tp.deployDate||tp.status==='Checked'||isTD(tp)||isOD(tp))return false;const d=new Date(tp.deployDate),n=new Date(),f=new Date();f.setDate(n.getDate()+3);n.setHours(0,0,0,0);return d>=n&&d<=f;};
const bc=t=>KT.includes(t)?'b-'+t:'b-X';
const fd=d=>{if(!d)return'—';const dt=d.length>10?d.substring(0,10):d;return new Date(dt+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});};
const sL=()=>{try{localStorage.setItem('g_d',JSON.stringify(D))}catch(e){}};
const lL=()=>{try{const d=localStorage.getItem('g_d');if(d)D=JSON.parse(d)}catch(e){}};

function toast(msg,type,detail){
  const icons={ok:'✅',w:'⚠️',e:'❌',i:'ℹ️'};const titles={ok:'Success',w:'Warning',e:'Error',i:'Info'};
  const a=document.getElementById('tA'),el=document.createElement('div');
  el.className='toast toast-'+type;
  el.innerHTML='<div class="toast-icon">'+icons[type]+'</div><div class="toast-body"><div class="toast-title">'+titles[type]+'</div><div class="toast-msg">'+(detail||msg)+'</div></div><button class="toast-x" data-tx>✕</button><div class="toast-bar"></div>';
  a.appendChild(el);
  el.querySelector('[data-tx]').addEventListener('click',()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);});
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);},3200);
}

const setSP=s=>{const e=document.getElementById('sP'),m={ok:['p-ok','Synced'],off:['p-off','Local'],err:['p-err','Error'],ld:['p-ld','Working…']};e.className='pill '+(m[s]||m.off)[0];e.textContent=(m[s]||m.off)[1];};

// DOWNLOAD from Google Sheet
async function pull(){
  const url=cfg('url');if(!url){setSP('off');return;}setSP('ld');
  try{
    const r=await fetch(url);const data=await r.json();
    if(Array.isArray(data)&&data.length){
      D=data.filter(r=>r.JiraURL).map(r=>{
        const jira=r.JiraURL||'';const tps=[];let i=1;
        while(r['TP'+i+'_CLCode']){
          let dt=r['TP'+i+'_DeployDate']||'';if(dt&&dt.length>10)dt=dt.substring(0,10);
          tps.push({clCode:r['TP'+i+'_CLCode'],deployDate:dt,status:r['TP'+i+'_Status']||'Pending'});i++;
        }
        return{id:stableId(jira),jira,name:r.CampaignName||'',type:r.CampaignType||'',market:r.Market||'',owner:r.Owner||'',reviewer:r.Reviewer||'',notes:r.Notes||'',touchpoints:tps,created:Date.now()};
      });sL();
    }
    setSP('ok');toast('Download complete','ok',D.length+' campaigns loaded from Sheet');
  }catch(e){console.error(e);setSP('err');toast('Download failed','e','Check your Sync URL');}
}

// UPLOAD ALL to Google Sheet
async function upload(){
  const url=cfg('url');
  if(!url){toast('No Sync URL configured','w','Open Settings to add URL');return;}
  if(!D.length){toast('Nothing to upload','w','Add campaigns first');return;}
  if(!cfg('name')){toast('Name required','w','Set your name in Settings');return;}
  setSP('ld');toast('Uploading '+D.length+' campaigns…','i','Pushing to Google Sheet');
  try{
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'saveAll',campaigns:D,user:cfg('name')})});
    setSP('ok');
    setTimeout(()=>toast('Upload complete','ok',D.length+' campaigns pushed to Sheet'),500);
  }catch(e){console.error(e);setSP('err');toast('Upload failed','e','Check your connection');}
}

function renderN(){const today=[],overdue=[],upcoming=[];D.forEach(c=>c.touchpoints.forEach(tp=>{const it={camp:c.name,cl:tp.clCode,market:c.market,date:tp.deployDate};if(isTD(tp)&&tp.status!=='Checked')today.push(it);else if(isOD(tp))overdue.push(it);else if(isUp(tp))upcoming.push(it);}));const cnt=today.length+overdue.length;document.getElementById('bB').textContent=cnt;document.getElementById('bB').classList.toggle('on',cnt>0);const nb=document.getElementById('nB');if(!cnt&&!upcoming.length){nb.innerHTML='<div class="npe">✅ All clear — nothing urgent</div>';return;}let h='';const sec=(items,title,dc)=>{if(!items.length)return'';return'<div class="nps"><div class="npst" style="color:var(--'+dc+')">'+title+' <span class="npcnt" style="background:var(--'+dc+'b)">'+items.length+'</span></div>'+items.map(i=>'<div class="npi"><span class="npdt" style="background:var(--'+dc+')"></span><div><div class="npc2">'+i.camp+'</div><div class="npcl">'+i.cl+'</div>'+(i.date?'<div class="npm2">'+fd(i.date)+'</div>':'')+'</div></div>').join('')+'</div>';};h+=sec(today,'🔴 Live Today','dg');if(today.length&&overdue.length)h+='<div class="npv"></div>';h+=sec(overdue,'⚠️ Overdue','wn');if((today.length||overdue.length)&&upcoming.length)h+='<div class="npv"></div>';h+=sec(upcoming,'📅 Next 3 Days','bl');nb.innerHTML=h;}
function stats(){let t=0,ck=0,p=0;D.forEach(c=>{t+=c.touchpoints.length;c.touchpoints.forEach(tp=>{if(tp.status==='Checked')ck++;else p++;});});document.getElementById('s0').textContent=D.length;document.getElementById('s1').textContent=t;document.getElementById('s2').textContent=ck;document.getElementById('s3').textContent=p;}

function render(){
  const q=(document.getElementById('qI').value||'').toLowerCase(),ft=document.getElementById('fTy').value,fs=document.getElementById('fSt').value,so=document.getElementById('fSo').value;
  let list=D.filter(c=>{if(ft&&c.type!==ft)return false;if(fs==='Overdue'&&!c.touchpoints.some(isOD))return false;if(fs==='Pending'&&!c.touchpoints.some(t=>t.status==='Pending'))return false;if(fs==='Checked'&&!c.touchpoints.some(t=>t.status==='Checked'))return false;if(q)return(c.name+c.jira+c.type+c.market+c.owner+c.reviewer+(c.notes||'')).toLowerCase().includes(q)||c.touchpoints.some(t=>t.clCode.toLowerCase().includes(q));return true;});
  list.sort((a,b)=>{if(so==='name')return a.name.localeCompare(b.name);if(so==='oldest')return(a.created||0)-(b.created||0);if(so==='progress'){const pa=a.touchpoints.length?a.touchpoints.filter(t=>t.status==='Checked').length/a.touchpoints.length:0,pb=b.touchpoints.length?b.touchpoints.filter(t=>t.status==='Checked').length/b.touchpoints.length:0;return pb-pa;}return(b.created||0)-(a.created||0);});
  const el=document.getElementById('cL');
  if(!list.length){el.innerHTML='<div class="es">'+(q||ft||fs?'No results found':'No campaigns yet — click <strong>+ New Campaign</strong>')+'</div>';stats();renderN();sL();return;}
  let h='';
  list.forEach(c=>{
    const ck=c.touchpoints.filter(t=>t.status==='Checked').length,tot=c.touchpoints.length,pct=tot?Math.round(ck/tot*100):0;
    const hasOD=c.touchpoints.some(isOD),allDone=tot>0&&ck===tot,hasPending=c.touchpoints.some(t=>t.status==='Pending'&&!isOD(t));
    const bCls=allDone?'c-ok':(hasOD?'c-dg':(hasPending?'c-wn':'c-new'));
    let tp='';
    if(tot){
      tp='<table class="tt"><thead><tr><th>#</th><th>CL Code</th><th>Deploy Date</th><th>Status</th><th>By</th><th></th></tr></thead><tbody>';
      c.touchpoints.forEach((t,i)=>{const od=isOD(t),td=isTD(t)&&t.status!=='Checked',ckd=t.status==='Checked';
        tp+='<tr class="'+(od?'rod':'')+'"><td><div class="tn '+(ckd?'tn-c':(od?'tn-o':'tn-p'))+'">'+(i+1)+'</div></td>';
        tp+='<td><span class="tcl">'+t.clCode+'</span></td>';
        tp+='<td><div class="tdt'+(od?' tdt-o':'')+(td?' tdt-t':'')+'">'+(td?'● ':'')+fd(t.deployDate)+'</div><input type="date" class="tdi" value="'+(t.deployDate&&t.deployDate.length>10?t.deployDate.substring(0,10):t.deployDate||'')+'" data-ed="'+c.id+'-'+i+'"></td>';
        tp+='<td><button class="tst '+(ckd?'tst-c':(od?'tst-o':'tst-p'))+'" data-ts="'+c.id+'-'+i+'"><span class="tsd"></span>'+(ckd?'Checked':(od?'Overdue':'Pending'))+'</button></td>';
        tp+='<td><span class="tsb">'+(t.submittedBy||'—')+'</span></td>';
        tp+='<td><div class="tac"><button class="cic" data-dp="'+c.id+'-'+i+'" title="Duplicate">⧉</button><button class="cic cic-d" data-dt="'+c.id+'-'+i+'" title="Delete">✕</button></div></td></tr>';
      });tp+='</tbody></table>';
    }else tp='<div class="te">No touchpoints yet — click <strong>+ Touchpoint</strong></div>';
    h+='<div class="cc '+bCls+'"><div class="ch" data-tc="'+c.id+'"><div class="ci"><div class="cr1"><span class="cn">'+c.name+'</span><span class="cbg '+bc(c.type)+'">'+c.type+'</span>'+(c.market?'<span class="mktb">🌍 '+c.market+'</span>':'')+'</div><div class="cr2"><a href="'+c.jira+'" target="_blank" class="cjr">'+dJ(c.jira)+'</a><span class="cmt">👤 '+c.owner+'</span><span class="cmt">🔍 '+c.reviewer+'</span></div></div><div class="ca"><div class="cpw"><div class="cpb"><div class="cpf" style="width:'+pct+'%"></div></div><div class="cpt">'+ck+'/'+tot+(pct?' · '+pct+'%':'')+'</div></div><button class="cbtn" data-at="'+c.id+'">+ Touchpoint</button><button class="cic" data-ec="'+c.id+'">✏️</button><button class="cic cic-d" data-dc="'+c.id+'">🗑</button><svg class="chv" data-cv="'+c.id+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div></div>';
    h+='<div class="cb" data-cb="'+c.id+'"><div style="margin-bottom:16px"><div class="nl">Notes</div><textarea class="ni" data-nt="'+c.id+'">'+(c.notes||'')+'</textarea></div><div class="ttb"><button class="cbtn" data-at="'+c.id+'">+ Touchpoint</button><button class="cbtn" data-bt="'+c.id+'">⚡ Bulk Add</button></div>'+tp+'</div></div>';
  });
  el.innerHTML=h;stats();renderN();sL();renderTL(list);
}

function renderTL(list){const tv=document.getElementById('tV');const all=[];(list||D).forEach(c=>c.touchpoints.forEach(tp=>{if(tp.deployDate)all.push({date:tp.deployDate.length>10?tp.deployDate.substring(0,10):tp.deployDate,cl:tp.clCode,camp:c.name,type:c.type});}));all.sort((a,b)=>a.date.localeCompare(b.date));if(!all.length){tv.innerHTML='<div class="es">No deployment dates set</div>';return;}const mo={};all.forEach(it=>{const k=new Date(it.date+'T00:00:00').toLocaleString('default',{month:'long',year:'numeric'});if(!mo[k])mo[k]=[];mo[k].push(it);});let h='';Object.keys(mo).forEach(m=>{h+='<div class="tlg"><div class="tll">'+m+'</div>';mo[m].forEach(it=>{h+='<div class="tli"><span style="font-family:JetBrains Mono;font-size:11px;color:var(--g4)">'+fd(it.date)+'</span><span style="font-family:JetBrains Mono;font-size:11px;color:var(--bl)">'+it.cl+'</span><span style="font-weight:600">'+it.camp+'</span><span class="cbg '+bc(it.type)+'" style="font-size:9px;padding:3px 10px">'+it.type+'</span></div>';});h+='</div>';});tv.innerHTML=h;}

function init(){
  document.getElementById('mkL').innerHTML=AM.map(m=>'<option value="'+m+'">').join('');
  document.getElementById('cN').value=cfg('name');document.getElementById('cU').value=cfg('url');
  if(cfg('theme')==='dark'){document.body.dataset.theme='dark';document.getElementById('bTh').textContent='☀️';}
  lL();render(); // Load local only on start — no auto-download

  // SETTINGS
  document.getElementById('bSe').addEventListener('click',()=>{document.getElementById('cN').value=cfg('name');document.getElementById('cU').value=cfg('url');OM('moS');});
  document.getElementById('msX').addEventListener('click',()=>CM('moS'));
  document.getElementById('moS').addEventListener('click',e=>{if(e.target.id==='moS')CM('moS');});
  document.getElementById('msS').addEventListener('click',()=>{const n=document.getElementById('cN').value.trim();if(!n){toast('Name is required','w','Enter your name');return;}cfg('name',n);cfg('url',document.getElementById('cU').value.trim());CM('moS');toast('Settings saved','ok','Your preferences updated');});

  // UPLOAD
  document.getElementById('bUp').addEventListener('click',upload);
  // DOWNLOAD
  document.getElementById('bSy').addEventListener('click',()=>{if(cfg('url')){toast('Downloading…','i','Fetching from Sheet');pull().then(render);}else toast('No Sync URL','w','Open Settings');});

  // NOTIFICATIONS
  document.getElementById('bBl').addEventListener('click',e=>{e.stopPropagation();document.getElementById('nP').classList.toggle('open');});
  document.getElementById('nX').addEventListener('click',()=>document.getElementById('nP').classList.remove('open'));
  document.addEventListener('click',e=>{if(!e.target.closest('#bBl')&&!e.target.closest('#nP'))document.getElementById('nP').classList.remove('open');});

  // CAMPAIGN MODAL
  document.getElementById('bNw').addEventListener('click',()=>{rCF();OM('moC');});
  document.getElementById('mcX').addEventListener('click',()=>CM('moC'));
  document.getElementById('moC').addEventListener('click',e=>{if(e.target.id==='moC')CM('moC');});
  document.getElementById('fNm').addEventListener('input',function(){const t=dType(this.value);document.getElementById('tAB').style.display=t?'inline-flex':'none';if(t)document.getElementById('fTp').value=t;const m=dMarket(this.value);document.getElementById('mAB').style.display=m?'inline-flex':'none';if(m)document.getElementById('fMk').value=m.name;});
  document.getElementById('mcS').addEventListener('click',()=>{
    const j=document.getElementById('fJ').value.trim(),n=document.getElementById('fNm').value.trim(),t=document.getElementById('fTp').value.trim(),m=document.getElementById('fMk').value.trim();
    if(!j){toast('JIRA ID required','w','Enter a JIRA ticket number');return;}
    if(!n){toast('Campaign name required','w','Enter the campaign name');return;}
    if(!t){toast('Campaign type required','w','Select or type a campaign type');return;}
    const jira=fJ(j);const id=stableId(jira);const eid=document.getElementById('eId').value;
    if(eid){const c=D.find(x=>x.id===eid);if(c){c.jira=jira;c.name=n;c.type=t;c.market=m;c.owner=document.getElementById('fOw').value.trim()||cfg('name')||'—';c.reviewer=document.getElementById('fRv').value.trim()||'—';c.notes=document.getElementById('fNt').value;sL();toast('Campaign updated','ok',n);}}
    else{if(D.find(x=>x.jira===jira)){toast('Campaign already exists','w','This JIRA ID is already tracked');return;}D.push({id,jira,name:n,type:t,market:m,owner:document.getElementById('fOw').value.trim()||cfg('name')||'—',reviewer:document.getElementById('fRv').value.trim()||'—',notes:document.getElementById('fNt').value,touchpoints:[],created:Date.now()});sL();toast('Campaign created','ok',n);}
    CM('moC');render();
  });

  // TP MODAL
  document.getElementById('moT').addEventListener('click',e=>{if(e.target.id==='moT')CM('moT');});
  document.getElementById('mtX').addEventListener('click',()=>CM('moT'));
  document.getElementById('bBk').addEventListener('click',function(){bm=!bm;document.getElementById('tpS').classList.toggle('hidden',bm);document.getElementById('tpB').classList.toggle('hidden',!bm);this.textContent=bm?'📝 Switch to Single Mode':'⚡ Switch to Bulk Mode';});

  function saveOneTP(campId){
    const cl=document.getElementById('fCL').value.trim();
    if(!cl){toast('CL Code required','w','Enter a touchpoint CL code');return false;}
    const c=D.find(x=>x.id===campId);
    if(!c){toast('Campaign not found','e','Try refreshing');return false;}
    let dt=document.getElementById('fDt').value||'';if(dt&&dt.length>10)dt=dt.substring(0,10);
    c.touchpoints.push({clCode:cl,deployDate:dt,status:document.getElementById('fSs').value,submittedBy:cfg('name')||'—'});
    sL();toast('Touchpoint added','ok',cl);return true;
  }
  function saveBulkTP(campId){
    const raw=document.getElementById('fBC').value.trim();
    if(!raw){toast('Enter CL codes','w','One code per line');return false;}
    const c=D.find(x=>x.id===campId);
    if(!c){toast('Campaign not found','e');return false;}
    let dd=document.getElementById('fBD').value||'';if(dd&&dd.length>10)dd=dd.substring(0,10);
    let n=0;raw.split('\n').map(l=>l.trim()).filter(Boolean).forEach(cl=>{c.touchpoints.push({clCode:cl,deployDate:dd,status:'Pending',submittedBy:cfg('name')||'—'});n++;});
    if(n){sL();toast(n+' touchpoints added','ok','Bulk import complete');}return true;
  }

  document.getElementById('mtS').addEventListener('click',()=>{
    const cid=document.getElementById('tCd').value;
    const ok=bm?saveBulkTP(cid):saveOneTP(cid);
    if(ok){CM('moT');rTF();render();}
  });
  document.getElementById('mtA').addEventListener('click',()=>{
    const cid=document.getElementById('tCd').value;
    const ok=bm?saveBulkTP(cid):saveOneTP(cid);
    if(ok){
      if(!bm){document.getElementById('fCL').value='';document.getElementById('fDt').value='';document.getElementById('fCL').focus();}
      else{document.getElementById('fBC').value='';document.getElementById('fBC').focus();}
      render();
    }
  });

  // DELEGATION — all local, no push
  document.getElementById('cL').addEventListener('click',e=>{const t=e.target;
    const tg=t.closest('[data-tc]');if(tg&&!t.closest('a')&&!t.closest('button')&&!t.closest('input')&&!t.closest('textarea')){const id=tg.dataset.tc;document.querySelector('[data-cb="'+id+'"]')?.classList.toggle('open');document.querySelector('[data-cv="'+id+'"]')?.classList.toggle('open');return;}
    const at=t.closest('[data-at]');if(at){document.getElementById('tCd').value=at.dataset.at;rTF();OM('moT');return;}
    const bt=t.closest('[data-bt]');if(bt){document.getElementById('tCd').value=bt.dataset.bt;rTF();bm=true;document.getElementById('tpS').classList.add('hidden');document.getElementById('tpB').classList.remove('hidden');document.getElementById('bBk').textContent='📝 Switch to Single Mode';OM('moT');return;}
    const ec=t.closest('[data-ec]');if(ec){const c=D.find(x=>x.id===ec.dataset.ec);if(c){document.getElementById('eId').value=c.id;document.getElementById('mcT').textContent='Edit Campaign';document.getElementById('fJ').value=dJ(c.jira);document.getElementById('fOw').value=c.owner;document.getElementById('fRv').value=c.reviewer;document.getElementById('fNm').value=c.name;document.getElementById('fTp').value=c.type;document.getElementById('fMk').value=c.market||'';document.getElementById('fNt').value=c.notes||'';OM('moC');}return;}
    const dc=t.closest('[data-dc]');if(dc){D=D.filter(x=>x.id!==dc.dataset.dc);sL();render();toast('Campaign deleted','ok');return;}
    const ts=t.closest('[data-ts]');if(ts){const[cid,ti]=ts.dataset.ts.split(/-(?=[^-]*$)/);const c=D.find(x=>x.id===cid);if(c?.touchpoints[+ti]){c.touchpoints[+ti].status=c.touchpoints[+ti].status==='Pending'?'Checked':'Pending';sL();render();toast('Status updated','ok',c.touchpoints[+ti].status);}return;}
    const dp=t.closest('[data-dp]');if(dp){const[cid,ti]=dp.dataset.dp.split(/-(?=[^-]*$)/);const c=D.find(x=>x.id===cid);if(c?.touchpoints[+ti]){c.touchpoints.push({...c.touchpoints[+ti],status:'Pending',submittedBy:cfg('name')});sL();render();toast('Touchpoint duplicated','ok');}return;}
    const dt=t.closest('[data-dt]');if(dt){const[cid,ti]=dt.dataset.dt.split(/-(?=[^-]*$)/);const c=D.find(x=>x.id===cid);if(c){c.touchpoints.splice(+ti,1);sL();render();toast('Touchpoint removed','ok');}return;}
  });
  document.getElementById('cL').addEventListener('change',e=>{if(e.target.matches('[data-ed]')){const[cid,ti]=e.target.dataset.ed.split(/-(?=[^-]*$)/);const c=D.find(x=>x.id===cid);if(c?.touchpoints[+ti]){let dt=e.target.value||'';if(dt&&dt.length>10)dt=dt.substring(0,10);c.touchpoints[+ti].deployDate=dt;sL();render();toast('Date updated','ok',fd(dt));}}});
  document.getElementById('cL').addEventListener('input',e=>{if(e.target.matches('[data-nt]')){const c=D.find(x=>x.id===e.target.dataset.nt);if(c){c.notes=e.target.value;sL();}}});

  document.getElementById('qI').addEventListener('input',render);document.getElementById('fTy').addEventListener('change',render);document.getElementById('fSt').addEventListener('change',render);document.getElementById('fSo').addEventListener('change',render);
  document.getElementById('vL').addEventListener('click',function(){this.classList.add('on');document.getElementById('vT').classList.remove('on');document.getElementById('lV').style.display='';document.getElementById('tV').classList.remove('on');});
  document.getElementById('vT').addEventListener('click',function(){this.classList.add('on');document.getElementById('vL').classList.remove('on');document.getElementById('lV').style.display='none';document.getElementById('tV').classList.add('on');renderTL();});
  document.getElementById('bTh').addEventListener('click',()=>{const dk=document.body.dataset.theme==='dark';document.body.dataset.theme=dk?'':'dark';document.getElementById('bTh').textContent=dk?'🌙':'☀️';cfg('theme',dk?'':'dark');});
  document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)){if(e.key==='Escape'){CM('moC');CM('moT');CM('moS');}return;}if(e.key==='n'||e.key==='N'){e.preventDefault();rCF();OM('moC');}if(e.key==='Escape'){CM('moC');CM('moT');CM('moS');}});
}
const OM=id=>document.getElementById(id).classList.add('on');const CM=id=>document.getElementById(id).classList.remove('on');
const rCF=()=>{['fJ','fRv','fNm','fTp','fMk','fNt'].forEach(id=>document.getElementById(id).value='');document.getElementById('tAB').style.display='none';document.getElementById('mAB').style.display='none';document.getElementById('eId').value='';document.getElementById('mcT').textContent='New Campaign';document.getElementById('fOw').value=cfg('name')||'';};
const rTF=()=>{['fCL','fBC','fBD'].forEach(id=>document.getElementById(id).value='');document.getElementById('fDt').value='';document.getElementById('fSs').value='Pending';bm=false;document.getElementById('tpS').classList.remove('hidden');document.getElementById('tpB').classList.add('hidden');document.getElementById('bBk').textContent='⚡ Switch to Bulk Mode';};
init();
})();
</script>

</body></html>
